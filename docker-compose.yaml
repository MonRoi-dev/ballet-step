version: '3.8'

services:
    # Основная база данных (один инстанс - разные БД внутри для сервисов)
    postgres:
        image: postgres:15-alpine
        container_name: ballet-postgres
        restart: always
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: password
            POSTGRES_MULTIPLE_DATABASES: auth_db,catalog_db,order_db # Для скрипта инициализации
        ports:
            - '5431:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            # Скрипт для создания нескольких БД при старте
            - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    # Кеширование
    redis:
        image: redis:alpine
        container_name: ballet-redis
        ports:
            - '6379:6379'

    # Брокер сообщений
    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: ballet-rabbitmq
        ports:
            - '5672:5672' # Порт для работы
            - '15672:15672' # Админка (user: guest, pass: guest)

    # Локальный S3 (MinIO)
    minio:
        image: minio/minio
        container_name: ballet-minio
        ports:
            - '9000:9000' # API
            - '9001:9001' # Консоль управления
        environment:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: password123
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data

volumes:
    postgres_data:
    minio_data:
